<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nossa história em desenho 💕</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #ffd9e6 0%, #ffe0f0 40%, #d4e8ff 100%);
            font-family: 'Quicksand', 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        .card {
            max-width: 1100px;
            width: 100%;
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(8px);
            border-radius: 48px 48px 32px 32px;
            box-shadow: 0 20px 40px rgba(255, 150, 200, 0.3), 0 8px 20px rgba(0,0,0,0.1);
            padding: 24px 24px 32px;
            border: 2px solid rgba(255, 255, 255, 0.7);
        }

        h1 {
            text-align: center;
            font-size: 2.4rem;
            font-weight: 600;
            color: #a53f6c;
            text-shadow: 4px 4px 0 #ffc1d6;
            letter-spacing: 1px;
            margin-bottom: 16px;
            font-family: 'Fredoka One', cursive;
        }

        .slide-container {
            position: relative;
            background: #ffe9f3;
            border-radius: 40px;
            padding: 20px;
            box-shadow: inset 0 -4px 0 #f8b0c8, 0 10px 20px #ffb6d1;
            border: 3px solid white;
        }

        canvas {
            display: block;
            width: 100%;
            height: auto;
            background: #fef7fa;
            border-radius: 32px;
            box-shadow: 0 8px 0 #d991b2;
            cursor: pointer;
            transition: transform 0.2s ease;
            aspect-ratio: 16 / 9;
        }

        canvas:active {
            transform: scale(0.99);
        }

        .caption {
            text-align: center;
            font-size: 1.8rem;
            font-weight: 600;
            margin: 20px 0 10px;
            padding: 12px 24px;
            background: rgba(255, 240, 245, 0.9);
            border-radius: 60px;
            display: inline-block;
            width: auto;
            margin-left: auto;
            margin-right: auto;
            color: #7c3f5a;
            box-shadow: 0 4px 0 #f2b0c0;
            border: 2px solid white;
            font-family: 'Patrick Hand', cursive;
            backdrop-filter: blur(4px);
            line-height: 1.4;
        }

        .nav-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-top: 24px;
            flex-wrap: wrap;
        }

        .nav-btn {
            background: white;
            border: none;
            font-size: 2.2rem;
            width: 70px;
            height: 70px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 6px 0 #dbb0c0, 0 8px 16px rgba(200, 120, 160, 0.3);
            transition: 0.08s linear;
            color: #b95b8c;
            border: 2px solid #ffe2f0;
            font-weight: bold;
        }

        .nav-btn:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 #dbb0c0;
        }

        .nav-btn:disabled {
            opacity: 0.3;
            transform: none;
            pointer-events: none;
            filter: grayscale(0.5);
        }

        .page-indicator {
            background: #ffdae9;
            padding: 14px 32px;
            border-radius: 50px;
            font-size: 1.6rem;
            font-weight: 600;
            color: #972b5b;
            border: 2px solid white;
            box-shadow: 0 4px 0 #d48fb0;
            font-family: 'Fredoka One', cursive;
        }

        .footer-hearts {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 20px;
            font-size: 2rem;
            color: #ff94b6;
            filter: drop-shadow(0 4px 4px #ffb8d0);
        }

        @media (max-width: 600px) {
            h1 { font-size: 1.8rem; }
            .caption { font-size: 1.3rem; }
            .nav-btn { width: 55px; height: 55px; font-size: 1.8rem; }
            .page-indicator { font-size: 1.3rem; padding: 8px 20px; }
        }
    </style>
    <!-- fontes fofas -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Patrick+Hand&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="card">
        <h1>💖 nossa história em desenho 💖</h1>
        <div class="slide-container">
            <canvas id="storyCanvas" width="1000" height="562"></canvas> <!-- 16:9 aproximado -->
        </div>
        <div class="caption" id="slideCaption">📚 O primeiro olhar na escola</div>

        <div class="nav-controls">
            <button class="nav-btn" id="prevBtn" aria-label="anterior">◀</button>
            <span class="page-indicator" id="pageIndicator">1 / 10</span>
            <button class="nav-btn" id="nextBtn" aria-label="próximo">▶</button>
        </div>
        <div class="footer-hearts">
            <span>❤️</span> <span>💖</span> <span>💘</span> <span>💕</span> <span>💗</span> <span>💓</span>
        </div>
    </div>
    <script>
        (function() {
            // ---------- cores fixas dos personagens (estilo consistente) ----------
            const COLORS = {
                boySkin: '#8B5A2B',      // moreno escuro
                boyHair: '#3E2A1F',       // cabelo castanho escuro cacheado
                girlSkin: '#FFE0BD',       // pele clara
                girlHair: '#B76E5A',       // cabelo ondulado castanho claro
                shirtBoy: '#7FB4D5',       // azul clarinho
                shirtGirl: '#F9ACB5',       // rosinha
                pantsBoy: '#5D7A9A',        // azul jeans
                pantsGirl: '#D9A5B3',        // rosa queimado
                shadow: '#d9b2b2',
                pastelPink: '#FFC0CB',
                pastelBlue: '#ADD8E6',
                pastelYellow: '#FFFACD',
                white: '#FFFFFF',
            };

            // frases detalhadas de cada slide
            const phrases = [
                "📚 Slide 1 – Escola\nO menino vê a menina pela primeira vez, encantado enquanto ela conversa com amigas.",
                "👀 Slide 2 – A troca de olhares na rua\nEles se cruzam e seus olhos se encontram de forma especial.",
                "📱 Slide 3 – Pedindo o Instagram\nO menino, tímido, pede ajuda às amigas para conseguir o contato dela.",
                "💬 Slide 4 – Conversando no celular\nOs dois em casa, sorrindo e trocando mensagens até tarde.",
                "🤫 Slide 5 – Encontrando escondido\nA menina sai de casa discretamente para um encontro secreto e romântico.",
                "⏳ Slide 6 – Ansioso esperando o final de semana\nO menino deitado na cama, contando os dias para vê-la.",
                "👨‍👩‍👧 Slide 7 – Contando para os pais\nO casal, nervoso, conversa com os pais dela e tudo dá certo.",
                "💍 Slide 8 – Pedido de namoro\nEm um momento romântico, ele entrega uma caixinha com alianças.",
                "🐶 Slide 9 – Trabalhando no pet shop\nEle dá banho em cachorros para juntar dinheiro e comprar as alianças.",
                "💞 Slide 10 – Final feliz\nAbraçados e felizes, celebrando o amor que continua forte."
            ];

            const canvas = document.getElementById('storyCanvas');
            const ctx = canvas.getContext('2d');
            const captionEl = document.getElementById('slideCaption');
            const pageInd = document.getElementById('pageIndicator');
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');

            let currentSlide = 0;

            // ---------- funções base para desenhar os personagens (sempre iguais) ----------
            function drawBasePerson(ctx, x, y, type, expression = 'smile') {
                const skinColor = (type === 'boy') ? COLORS.boySkin : COLORS.girlSkin;
                const hairColor = (type === 'boy') ? COLORS.boyHair : COLORS.girlHair;
                const shirtColor = (type === 'boy') ? COLORS.shirtBoy : COLORS.shirtGirl;
                const pantsColor = (type === 'boy') ? COLORS.pantsBoy : COLORS.pantsGirl;

                const headRadius = 36; // um pouco maior pra ficar mais fofo
                const neckY = y - headRadius*0.8;
                const bodyY = neckY + 18;

                // CABEÇA
                ctx.beginPath();
                ctx.arc(x, neckY, headRadius, 0, Math.PI * 2);
                ctx.fillStyle = skinColor;
                ctx.fill();
                ctx.strokeStyle = '#c09a8b';
                ctx.lineWidth = 2.5;
                ctx.stroke();

                // OLHOS (sempre grandes e expressivos)
                // olho esquerdo
                ctx.beginPath();
                ctx.arc(x - 14, neckY - 8, 7, 0, Math.PI * 2);
                ctx.fillStyle = 'white';
                ctx.fill();
                ctx.fillStyle = '#3F2E1F';
                ctx.beginPath();
                ctx.arc(x - 16, neckY - 10, 3.5, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(x - 14, neckY - 12, 1.5, 0, Math.PI * 2);
                ctx.fillStyle = 'white';
                ctx.fill();

                // olho direito
                ctx.beginPath();
                ctx.arc(x + 14, neckY - 8, 7, 0, Math.PI * 2);
                ctx.fillStyle = 'white';
                ctx.fill();
                ctx.fillStyle = '#3F2E1F';
                ctx.beginPath();
                ctx.arc(x + 16, neckY - 10, 3.5, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(x + 14, neckY - 12, 1.5, 0, Math.PI * 2);
                ctx.fillStyle = 'white';
                ctx.fill();

                // bochechas coradas (sempre)
                ctx.globalAlpha = 0.35;
                ctx.beginPath();
                ctx.arc(x - 22, neckY + 2, 8, 0, Math.PI*2);
                ctx.fillStyle = '#FFA5A5';
                ctx.fill();
                ctx.beginPath();
                ctx.arc(x + 22, neckY + 2, 8, 0, Math.PI*2);
                ctx.fill();
                ctx.globalAlpha = 1.0;

                // SOBRANCELHAS (expressão)
                ctx.strokeStyle = '#3F2E1F';
                ctx.lineWidth = 3;
                ctx.lineCap = 'round';
                if (expression === 'surprised') {
                    ctx.beginPath();
                    ctx.moveTo(x - 24, neckY - 22);
                    ctx.lineTo(x - 10, neckY - 28);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(x + 24, neckY - 22);
                    ctx.lineTo(x + 10, neckY - 28);
                    ctx.stroke();
                } else if (expression === 'shy' || expression === 'nervous') {
                    ctx.beginPath();
                    ctx.moveTo(x - 24, neckY - 20);
                    ctx.lineTo(x - 10, neckY - 18);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(x + 24, neckY - 20);
                    ctx.lineTo(x + 10, neckY - 18);
                    ctx.stroke();
                } else { // smile / feliz
                    ctx.beginPath();
                    ctx.moveTo(x - 24, neckY - 22);
                    ctx.lineTo(x - 10, neckY - 24);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(x + 24, neckY - 22);
                    ctx.lineTo(x + 10, neckY - 24);
                    ctx.stroke();
                }

                // BOCA (expressão)
                ctx.beginPath();
                ctx.strokeStyle = '#992244';
                ctx.lineWidth = 3.5;
                if (expression === 'smile' || expression === 'feliz') {
                    ctx.arc(x, neckY + 8, 14, 0.1, Math.PI - 0.1);
                } else if (expression === 'shy') {
                    ctx.arc(x, neckY + 6, 10, 0.2, Math.PI - 0.2);
                } else if (expression === 'surprised') {
                    ctx.arc(x, neckY + 8, 6, 0, Math.PI);
                } else if (expression === 'nervous') {
                    ctx.arc(x, neckY + 6, 8, 0.1, Math.PI - 0.3);
                }
                ctx.stroke();

                // CABELO (detalhado)
                if (type === 'boy') {
                    // cabelo cacheado: bolinhas fofas
                    ctx.fillStyle = hairColor;
                    ctx.beginPath();
                    ctx.arc(x - 20, neckY - 26, 12, 0, Math.PI*2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(x + 20, neckY - 26, 12, 0, Math.PI*2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(x, neckY - 34, 14, 0, Math.PI*2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(x - 8, neckY - 30, 9, 0, Math.PI*2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(x + 10, neckY - 30, 9, 0, Math.PI*2);
                    ctx.fill();
                } else {
                    // cabelo ondulado menina (mais volumoso)
                    ctx.fillStyle = hairColor;
                    ctx.beginPath();
                    ctx.ellipse(x, neckY - 28, 24, 20, 0, 0, Math.PI*2);
                    ctx.fill();
                    // ondas laterais
                    ctx.beginPath();
                    ctx.ellipse(x - 21, neckY - 22, 12, 18, -0.2, 0, Math.PI*2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.ellipse(x + 21, neckY - 22, 12, 18, 0.2, 0, Math.PI*2);
                    ctx.fill();
                }

                // CORPO (camiseta)
                ctx.fillStyle = shirtColor;
                ctx.beginPath();
                ctx.ellipse(x, bodyY + 10, 28, 34, 0, 0, Math.PI*2);
                ctx.fill();
                ctx.strokeStyle = '#c0a0b0';
                ctx.lineWidth = 1.5;
                ctx.stroke();

                // pernas
                ctx.fillStyle = pantsColor;
                ctx.beginPath();
                ctx.rect(x - 17, bodyY + 38, 14, 30);
                ctx.fill();
                ctx.beginPath();
                ctx.rect(x + 3, bodyY + 38, 14, 30);
                ctx.fill();

                // braços
                ctx.strokeStyle = shirtColor;
                ctx.lineWidth = 16;
                ctx.lineCap = 'round';
                // braço esquerdo
                ctx.beginPath();
                ctx.moveTo(x - 28, bodyY - 6);
                ctx.lineTo(x - 50, bodyY + 16);
                ctx.stroke();
                // braço direito
                ctx.beginPath();
                ctx.moveTo(x + 28, bodyY - 6);
                ctx.lineTo(x + 50, bodyY + 16);
                ctx.stroke();
                // mãozinhas
                ctx.fillStyle = skinColor;
                ctx.beginPath();
                ctx.arc(x - 52, bodyY + 18, 8, 0, Math.PI*2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(x + 52, bodyY + 18, 8, 0, Math.PI*2);
                ctx.fill();
            }

            function drawBoy(ctx, x, y, expr = 'smile') { drawBasePerson(ctx, x, y, 'boy', expr); }
            function drawGirl(ctx, x, y, expr = 'smile') { drawBasePerson(ctx, x, y, 'girl', expr); }

            // ---------- SLIDES DETALHADOS (cenas completas) ----------
            function drawSlide1() {
                // Escola: menino vê menina pela primeira vez
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                // céu rosa suave
                ctx.fillStyle = '#ffe0f0';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                // prédio da escola
                ctx.fillStyle = '#fde3b0';
                ctx.fillRect(100, 180, 280, 230);
                ctx.fillStyle = '#b58a6b';
                ctx.fillRect(220, 320, 50, 90); // porta
                // janelas
                ctx.fillStyle = '#b0e0ff';
                ctx.fillRect(140, 220, 50, 50);
                ctx.fillRect(270, 220, 50, 50);
                ctx.fillRect(140, 300, 50, 50);
                ctx.fillRect(270, 300, 50, 50);
                // telhado
                ctx.fillStyle = '#bf7f7f';
                ctx.beginPath();
                ctx.moveTo(70, 180);
                ctx.lineTo(410, 180);
                ctx.lineTo(240, 100);
                ctx.closePath();
                ctx.fill();

                // menino (esquerda) olhando apaixonado
                drawBoy(ctx, 500, 290, 'surprised');
                // menina com amigas (direita)
                drawGirl(ctx, 750, 280, 'smile');
                drawBasePerson(ctx, 690, 280, 'girl', 'smile');
                drawBasePerson(ctx, 810, 290, 'girl', 'smile');
                // corações saindo do menino
                ctx.fillStyle = '#ff80b5';
                ctx.font = '38px sans-serif';
                ctx.fillText('💖', 430, 200);
                ctx.fillText('💕', 470, 160);
            }

            function drawSlide2() {
                // Troca de olhares na rua
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                // céu azul pastel
                ctx.fillStyle = '#c4e0ff';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                // rua com calçada
                ctx.fillStyle = '#aab7b8';
                ctx.fillRect(0, 350, canvas.width, 80);
                ctx.fillStyle = '#d9d0c0';
                ctx.fillRect(0, 300, canvas.width, 50); // calçada
                // faixa de pedestre
                ctx.fillStyle = 'white';
                for (let i=0; i<5; i++) {
                    ctx.fillRect(400 + i*40, 320, 20, 30);
                }

                // menino atravessando (esquerda)
                drawBoy(ctx, 300, 270, 'smile');
                // menina atravessando (direita)
                drawGirl(ctx, 700, 270, 'smile');
                // seta de conexão de olhares
                ctx.beginPath();
                ctx.strokeStyle = '#ff3388';
                ctx.lineWidth = 5;
                ctx.setLineDash([15, 10]);
                ctx.moveTo(370, 210);
                ctx.lineTo(630, 210);
                ctx.stroke();
                ctx.setLineDash([]);
                // corações no ar
                ctx.fillStyle = '#ff66a0';
                ctx.font = '32px sans-serif';
                ctx.fillText('💓', 450, 150);
                ctx.fillText('💘', 520, 120);
            }

            function drawSlide3() {
                // Pedindo Instagram (menino com amigas)
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#fcd0e0';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                // menino tímido
                drawBoy(ctx, 300, 300, 'nervous');
                // duas amigas (ajudando)
                drawBasePerson(ctx, 200, 290, 'girl', 'smile');
                drawBasePerson(ctx, 100, 280, 'girl', 'smile');
                // celular grande
                ctx.fillStyle = '#e0e0e0';
                ctx.fillRect(550, 170, 150, 200);
                ctx.fillStyle = '#2d2d2d';
                ctx.fillRect(560, 180, 130, 170);
                ctx.fillStyle = '#f0f';
                ctx.font = 'bold 40px sans-serif';
                ctx.fillText('📸', 590, 280);
                ctx.fillStyle = '#ffffb0';
                ctx.font = '28px sans-serif';
                ctx.fillText('@amor', 580, 340);
                // corações de timidez
                ctx.fillStyle = '#ff8ab0';
                ctx.font = '30px sans-serif';
                ctx.fillText('💕', 350, 150);
            }

            function drawSlide4() {
                // Conversando no celular (cada um em casa)
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#e6ccff';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                // divisória ao meio
                ctx.strokeStyle = '#f09ac0';
                ctx.lineWidth = 10;
                ctx.beginPath();
                ctx.moveTo(canvas.width/2, 0);
                ctx.lineTo(canvas.width/2, canvas.height);
                ctx.stroke();

                // menino esquerda (quarto)
                ctx.fillStyle = '#b0d0f0';
                ctx.fillRect(30, 350, 200, 120); // cama
                drawBoy(ctx, 150, 280, 'smile');
                // celular na mão (simples)
                ctx.fillStyle = '#aaa';
                ctx.fillRect(220, 220, 40, 60);
                ctx.fillStyle = '#0f0';
                ctx.font = '26px sans-serif';
                ctx.fillText('💬', 225, 260);

                // menina direita (quarto)
                ctx.fillStyle = '#f9b0c0';
                ctx.fillRect(600, 340, 200, 130); // cama
                drawGirl(ctx, 730, 280, 'smile');
                ctx.fillStyle = '#aaa';
                ctx.fillRect(670, 220, 40, 60);
                ctx.fillStyle = '#f0f';
                ctx.font = '26px sans-serif';
                ctx.fillText('💖', 675, 260);

                // balões de mensagem no centro
                ctx.fillStyle = 'white';
                ctx.beginPath();
                ctx.ellipse(480, 120, 120, 60, 0, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = '#fa8cb0';
                ctx.font = '32px sans-serif';
                ctx.fillText('💬✨', 440, 135);
            }

            function drawSlide5() {
                // Encontrando escondido (noite, menina saindo)
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                // céu noturno estrelado
                ctx.fillStyle = '#162b4a';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                // estrelas
                ctx.fillStyle = '#fcf9d7';
                for (let i=0;i<30;i++) {
                    ctx.beginPath();
                    ctx.arc(30+ i*35, 40+ (i%4)*15, 2+ i%3, 0, Math.PI*2);
                    ctx.fill();
                }
                // lua
                ctx.fillStyle = '#faf0c0';
                ctx.beginPath();
                ctx.arc(800, 90, 60, 0, Math.PI*2);
                ctx.fill();

                // casa da menina (direita)
                ctx.fillStyle = '#b59a7a';
                ctx.fillRect(650, 250, 230, 180);
                ctx.fillStyle = '#6f4e37';
                ctx.fillRect(730, 360, 40, 70); // porta
                // menina saindo escondida na ponta dos pés
                drawGirl(ctx, 750, 290, 'shy');

                // menino esperando atrás de arbusto (esquerda)
                ctx.fillStyle = '#2d5a27';
                ctx.beginPath();
                ctx.ellipse(250, 340, 130, 60, 0, 0, Math.PI*2);
                ctx.fill();
                drawBoy(ctx, 250, 270, 'smile');

                // clima romântico: corações prateados
                ctx.fillStyle = '#ffb3c6';
                ctx.font = '40px sans-serif';
                ctx.fillText('🤫💕', 400, 180);
            }

            function drawSlide6() {
                // Ansioso esperando fim de semana
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#102b3f';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                // estrelas
                ctx.fillStyle = '#ece081';
                for (let i=0;i<20;i++) {
                    ctx.beginPath();
                    ctx.arc(50+ i*45, 70, 3, 0, Math.PI*2);
                    ctx.fill();
                }

                // quarto do menino
                ctx.fillStyle = '#7f6b5e';
                ctx.fillRect(200, 320, 500, 100); // cama
                ctx.fillStyle = '#c0a090';
                ctx.fillRect(220, 280, 460, 40); // travesseiro

                // menino deitado (desenhado deitado? vamos adaptar: cabeça no travesseiro)
                // cabeça
                ctx.beginPath();
                ctx.arc(420, 275, 38, 0, Math.PI*2);
                ctx.fillStyle = COLORS.boySkin;
                ctx.fill();
                ctx.strokeStyle = '#c09a8b';
                ctx.lineWidth=2;
                ctx.stroke();
                // cabelo
                ctx.fillStyle = COLORS.boyHair;
                ctx.beginPath();
                ctx.arc(410, 250, 18, 0, Math.PI*2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(440, 252, 16, 0, Math.PI*2);
                ctx.fill();

                // olho visível
                ctx.fillStyle = 'white';
                ctx.beginPath();
                ctx.arc(430, 270, 6, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = '#221100';
                ctx.beginPath();
                ctx.arc(432, 268, 3, 0, Math.PI*2);
                ctx.fill();

                // celular na mão
                ctx.fillStyle = '#333';
                ctx.fillRect(480, 230, 40, 70);
                // calendário
                ctx.fillStyle = '#f4c3b8';
                ctx.fillRect(600, 160, 120, 100);
                ctx.fillStyle = '#a5224a';
                ctx.font = 'bold 22px sans-serif';
                ctx.fillText('SÁB', 630, 210);
                ctx.fillStyle = '#ffd966';
                ctx.fillText('❤️', 660, 250);
            }

            function drawSlide7() {
                // Contando para os pais
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#ffe5b4';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                // sofá grande
                ctx.fillStyle = '#ba9e88';
                ctx.fillRect(150, 280, 600, 140);
                // almofadas
                ctx.fillStyle = '#e3b3c7';
                ctx.fillRect(200, 260, 80, 40);
                ctx.fillRect(600, 260, 80, 40);

                // pais (dois adultos)
                drawBasePerson(ctx, 700, 240, 'girl', 'smile'); // mãe (adaptado)
                drawBasePerson(ctx, 800, 250, 'boy', 'smile'); // pai (usamos boy)
                // casal de jovens (sentados)
                drawBoy(ctx, 300, 250, 'nervous');
                drawGirl(ctx, 400, 250, 'shy');

                // balão de fala
                ctx.fillStyle = 'white';
                ctx.beginPath();
                ctx.ellipse(550, 120, 150, 70, 0, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = '#a84c6f';
                ctx.font = 'bold 24px sans-serif';
                ctx.fillText('🗣️ pais...', 510, 130);
            }

            function drawSlide8() {
                // Pedido de namoro com alianças
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#ffd9e6';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                // parque/jardim
                ctx.fillStyle = '#9fdfb2';
                ctx.fillRect(0, 380, canvas.width, 120);
                // árvore
                ctx.fillStyle = '#6b8e4c';
                ctx.beginPath();
                ctx.arc(150, 280, 70, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = '#8b5a2b';
                ctx.fillRect(170, 310, 20, 100);

                // menino ajoelhado
                drawBoy(ctx, 400, 290, 'nervous');
                // caixinha de aliança
                ctx.fillStyle = '#cf9f7a';
                ctx.fillRect(410, 360, 40, 20);
                ctx.fillStyle = 'gold';
                ctx.beginPath();
                ctx.arc(430, 370, 8, 0, Math.PI*2);
                ctx.fill(); // anel
                // menina emocionada
                drawGirl(ctx, 550, 280, 'surprised');
                // chuva de corações
                ctx.fillStyle = '#ff3388';
                ctx.font = '44px sans-serif';
                ctx.fillText('💞💍💞', 200, 100);
            }

            function drawSlide9() {
                // Trabalhando no pet shop (banho em cachorro)
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#b5d1e8';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                // pet shop fachada
                ctx.fillStyle = '#aac9c9';
                ctx.fillRect(100, 200, 400, 250);
                ctx.fillStyle = '#5f8575';
                ctx.font = 'bold 32px sans-serif';
                ctx.fillText('🐾 PET SHOP', 150, 270);
                
                // menino trabalhando
                drawBoy(ctx, 250, 330, 'smile');
                // banheira com cachorro
                ctx.fillStyle = '#e5e5e5';
                ctx.fillRect(350, 350, 160, 50);
                ctx.fillStyle = '#b48b5a';
                ctx.beginPath();
                ctx.ellipse(420, 340, 35, 20, 0, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = '#442200';
                ctx.beginPath();
                ctx.arc(435, 320, 12, 0, Math.PI*2);
                ctx.fill(); // cabeça
                // bolhas de sabão
                ctx.fillStyle = '#d0f0ff';
                for (let i=0;i<6;i++) {
                    ctx.beginPath();
                    ctx.arc(380+ i*20, 300, 8, 0, Math.PI*2);
                    ctx.fill();
                }
            }

            function drawSlide10() {
                // Final feliz: casal abraçado
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                // gradiente romântico
                const grad = ctx.createLinearGradient(0,0,0,canvas.height);
                grad.addColorStop(0,'#ffc0cb');
                grad.addColorStop(1,'#ffe6f0');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // casal abraçado (lado a lado)
                drawBoy(ctx, 420, 280, 'smile');
                drawGirl(ctx, 550, 280, 'smile');
                // braços entrelaçados (simular abraço)
                ctx.strokeStyle = COLORS.shirtBoy;
                ctx.lineWidth = 18;
                ctx.beginPath();
                ctx.moveTo(470, 270);
                ctx.lineTo(520, 270);
                ctx.stroke();
                ctx.strokeStyle = COLORS.shirtGirl;
                ctx.beginPath();
                ctx.moveTo(500, 260);
                ctx.lineTo(540, 250);
                ctx.stroke();

                // muitos corações e brilhos
                ctx.fillStyle = '#ff4488';
                ctx.font = '60px sans-serif';
                ctx.fillText('❤️❤️❤️', 200, 100);
                ctx.fillText('💖💖', 650, 150);
                // arco-íris pastel
                for (let i=0; i<6; i++) {
                    ctx.fillStyle = ['#ffb3ba','#c5e0b4','#b5d0eb','#ffe69b','#f9c9e1'][i%5];
                    ctx.globalAlpha = 0.3;
                    ctx.fillRect(100 + i*40, 440, 35, 70);
                }
                ctx.globalAlpha = 1.0;
                ctx.fillStyle = '#ffffffd0';
                ctx.font = '32px sans-serif';
                ctx.fillText('felizes para sempre', 300, 480);
            }

            function renderSlide(index) {
                switch(index) {
                    case 0: drawSlide1(); break;
                    case 1: drawSlide2(); break;
                    case 2: drawSlide3(); break;
                    case 3: drawSlide4(); break;
                    case 4: drawSlide5(); break;
                    case 5: drawSlide6(); break;
                    case 6: drawSlide7(); break;
                    case 7: drawSlide8(); break;
                    case 8: drawSlide9(); break;
                    case 9: drawSlide10(); break;
                    default: drawSlide1();
                }
                captionEl.innerText = phrases[index];
                pageInd.innerText = (index+1) + ' / 10';
            }

            function updateButtons() {
                prevBtn.disabled = (currentSlide === 0);
                nextBtn.disabled = (currentSlide === 9);
            }

            function nextSlide() {
                if (currentSlide < 9) {
                    currentSlide++;
                    renderSlide(currentSlide);
                    updateButtons();
                }
            }

            function prevSlide() {
                if (currentSlide > 0) {
                    currentSlide--;
                    renderSlide(currentSlide);
                    updateButtons();
                }
            }

            prevBtn.addEventListener('click', prevSlide);
            nextBtn.addEventListener('click', nextSlide);

            window.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowRight') nextSlide();
                else if (e.key === 'ArrowLeft') prevSlide();
            });

            renderSlide(0);
            updateButtons();
        })();
    </script>
</body>
</html>
